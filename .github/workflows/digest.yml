name: Daily Digest

on:
  schedule:
    # 01:30 UTC = 07:00 IST. Adjust to taste.
    - cron: "30 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Curate digest (Claude, with rule-based fallback)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python scripts/curate.py --mode auto

      - name: Commit and push digest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "digest: $(date -u +%F) [skip ci]"
            git push
          fi
