name: Daily Digest

on:
  schedule:
    # Format is "minute hour ..." — 13:23 UTC = 9:23 AM Eastern (EDT).
    # Deliberately off the top of the hour: GitHub delays scheduled runs under
    # load, and load peaks at :00 because that's where everyone points their
    # crons. The 13:00 slot on 2026-07-19 fired 85 minutes late.
    # GitHub cron is fixed to UTC and doesn't shift for DST — when DST ends this
    # becomes 8:23 AM EST; bump to "23 14" if that matters.
    - cron: "23 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch news
        run: python scripts/fetch_news.py

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Curate digest (Claude, with rule-based fallback)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: python scripts/curate.py --mode auto

      - name: Commit and push digest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "digest: $(date -u +%F) [skip ci]"
            git push
          fi

      # Runs after the push so a mail failure can never block the site update.
      - name: Email digest
        continue-on-error: true
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python scripts/send_email.py
